<nav class="navbar" aria-label="Główna nawigacja" (keydown.escape)="closeMenuFromKeyboard()">
  <div class="navbar-container">
    <div class="navbar-brand">
      <a routerLink="/dashboard" class="brand-link" (click)="closeMenu()">
        <span class="brand-mark" aria-hidden="true">AM</span>
        <span class="brand-copy">
          <span class="brand-text">Asset Manager</span>
          <span class="brand-caption">Ewidencja wyposażenia</span>
        </span>
      </a>
    </div>

    <button
      #menuToggle
      type="button"
      class="menu-toggle"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen"
      aria-controls="primary-navigation"
      aria-label="Przełącz menu główne"
    >
      <span class="menu-toggle-lines" aria-hidden="true"></span>
    </button>

    <div id="primary-navigation" class="navbar-nav" [class.open]="isMenuOpen">
      <a routerLink="/dashboard" routerLinkActive="active" ariaCurrentWhenActive="page" class="nav-link" (click)="closeMenu()">
        <span class="nav-marker" aria-hidden="true"></span>
        Panel
      </a>

      <a routerLink="/assets" routerLinkActive="active" ariaCurrentWhenActive="page" class="nav-link" (click)="closeMenu()">
        <span class="nav-marker" aria-hidden="true"></span>
        Aktywa
      </a>

      <a routerLink="/assignments" routerLinkActive="active" ariaCurrentWhenActive="page" class="nav-link" (click)="closeMenu()">
        <span class="nav-marker" aria-hidden="true"></span>
        Przypisania
      </a>

      <a routerLink="/users" routerLinkActive="active" ariaCurrentWhenActive="page" class="nav-link" *ngIf="canManage" (click)="closeMenu()">
        <span class="nav-marker" aria-hidden="true"></span>
        Użytkownicy
      </a>

      <a routerLink="/locations" routerLinkActive="active" ariaCurrentWhenActive="page" class="nav-link" *ngIf="canManage" (click)="closeMenu()">
        <span class="nav-marker" aria-hidden="true"></span>
        Lokalizacje
      </a>

      <a routerLink="/categories" routerLinkActive="active" ariaCurrentWhenActive="page" class="nav-link" *ngIf="canManage" (click)="closeMenu()">
        <span class="nav-marker" aria-hidden="true"></span>
        Kategorie
      </a>

      <a routerLink="/audit-logs" routerLinkActive="active" ariaCurrentWhenActive="page" class="nav-link" *ngIf="isAdmin" (click)="closeMenu()">
        <span class="nav-marker" aria-hidden="true"></span>
        Audyt
      </a>
    </div>

    <div class="navbar-user">
      <span class="user-avatar" aria-hidden="true">{{ currentUser?.fullName?.charAt(0) || 'U' }}</span>
      <div class="user-info">
        <span class="user-name">{{ currentUser?.fullName }}</span>
        <span class="user-role">{{ currentUser?.roleName }}</span>
      </div>
      <button type="button" (click)="logout()" class="logout-btn">
        Wyloguj
      </button>
    </div>
  </div>
</nav>
